name: rtime-status-board

services:
  statusd:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    image: rtime-status-board/statusd:local
    container_name: rtime-status-board-statusd
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      STATUS_BOARD_DEPLOYMENT_MODE: production
      STATUS_BOARD_LISTEN_ADDR: "127.0.0.1:${STATUS_BOARD_PORT:-23180}"
      STATUS_BOARD_CONFIG: /app/config/status-board.yaml
      STATUS_BOARD_DB_PATH: /data/status-board.db
      STATUS_BOARD_GATUS_URL: "http://127.0.0.1:${GATUS_PORT:-23181}"
      STATUS_BOARD_CACHE_TTL: ${STATUS_BOARD_CACHE_TTL:-10s}
      STATUS_BOARD_METRICS_RETENTION: ${STATUS_BOARD_METRICS_RETENTION:-30d}
      STATUS_BOARD_FRONTEND_DIR: /app/frontend
      STATUS_BOARD_PUBLIC_DOMAIN: ${STATUS_BOARD_PUBLIC_DOMAIN:-status.example.com}
      STATUS_BOARD_PUBLIC_IP: ${STATUS_BOARD_PUBLIC_IP:-203.0.113.10}
      STATUS_BOARD_TAILNET_URL: ${STATUS_BOARD_TAILNET_URL:-http://100.64.10.5:18083}
      STATUS_BOARD_BUILD_COMMIT: ${STATUS_BOARD_BUILD_COMMIT:-unknown}
      STATUS_BOARD_BUILD_TIME: ${STATUS_BOARD_BUILD_TIME:-unknown}
      STATUS_BOARD_AUTH_COOKIE_NAME: ${STATUS_BOARD_AUTH_COOKIE_NAME:-rtime_status_session}
      STATUS_BOARD_AUTH_COOKIE_SECRET: ${STATUS_BOARD_AUTH_COOKIE_SECRET:-}
      STATUS_BOARD_AUTH_COOKIE_DOMAIN: ${STATUS_BOARD_AUTH_COOKIE_DOMAIN:-}
      STATUS_BOARD_AUTH_HTPASSWD: ${STATUS_BOARD_AUTH_HTPASSWD:-/run/rtime-status-board/.htpasswd}
      STATUS_BOARD_AUTH_SESSION_TTL: ${STATUS_BOARD_AUTH_SESSION_TTL:-720h}
      STATUS_BOARD_AUTH_DEVICE_TOKEN_SHA256: ${STATUS_BOARD_AUTH_DEVICE_TOKEN_SHA256:-}
      STATUS_BOARD_AUTH_DEVICE_USERNAME: ${STATUS_BOARD_AUTH_DEVICE_USERNAME:-rtime}
    network_mode: host
    volumes:
      - status_data:/data
      - /etc/nginx/.htpasswd-rtime-status-board:/run/rtime-status-board/.htpasswd:ro
    depends_on:
      - gatus

  gatus:
    image: ${GATUS_IMAGE:-twinproduction/gatus:latest}
    container_name: rtime-status-board-gatus
    restart: unless-stopped
    cap_add:
      - NET_RAW
    env_file:
      - .env.production
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GATUS_CONFIG_PATH: /config/config.yaml
      GATUS_LOG_LEVEL: INFO
      GATUS_WEB_ADDRESS: 127.0.0.1
      GATUS_WEB_PORT: ${GATUS_PORT:-23181}
      STATUS_BOARD_HOST_TARGET: 127.0.0.1
      STATUS_BOARD_API_TARGET: "127.0.0.1:${STATUS_BOARD_PORT:-23180}"
    network_mode: host
    volumes:
      - ./deploy/gatus/config.yaml:/config/config.yaml:ro
      - gatus_data:/data

volumes:
  status_data:
    name: rtime-status-board_status_data
  gatus_data:
    name: rtime-status-board_gatus_data

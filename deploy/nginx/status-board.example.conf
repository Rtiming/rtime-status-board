# Example Tailnet-private rtime-status-board endpoint.
# Copy to status.local.conf and replace addresses/domains before use.

server {
    listen 100.64.10.5:18083;
    server_name status.example.com rtime-status-board.local;

    allow 100.64.0.0/10;
    deny all;

    access_log /var/log/nginx/rtime-status-board.access.log;
    error_log /var/log/nginx/rtime-status-board.error.log;

    location / {
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional public entry. Human pages use signed-cookie auth; unauthenticated
# API requests should still return 401 so health checks can prove protection.
server {
    listen 80;
    server_name status.example.com;

    server_tokens off;

    location = /_auth/check {
        internal;
        proxy_pass http://127.0.0.1:23180/_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /login {
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_auth/logout {
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    location /api/ {
        auth_request /_auth/check;
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        auth_request /_auth/check;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional public HTTPS entry. Issue the certificate separately before enabling,
# for example with scripts/install-status-https-sh-core.sh on sh-core.
server {
    listen 443 ssl http2;
    server_name status.example.com;

    server_tokens off;
    ssl_certificate /etc/nginx/ssl/status.example.com.fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/status.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:status_board_ssl:10m;
    ssl_session_timeout 1d;

    add_header X-Robots-Tag "noindex, nofollow" always;

    access_log /var/log/nginx/rtime-status-board.public-ssl.access.log;
    error_log /var/log/nginx/rtime-status-board.public-ssl.error.log;

    location = /_auth/check {
        internal;
        proxy_pass http://127.0.0.1:23180/_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /login {
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /_auth/logout {
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    location /api/ {
        auth_request /_auth/check;
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        auth_request /_auth/check;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:23180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
